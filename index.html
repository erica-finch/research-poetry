<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Magnetic Research Poetry</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <h1>Magnetic Research Poetry</h1>
        <p>Drag words to create a poem. Click a word to see the research behind it.</p>
    </header>

    <main id="game-container">
        <div id="workspace"></div>

        <aside id="info-panel">
            <h2>Research Citations</h2>
            <div id="citation-display">
                <p class="placeholder">Click a word tile to explore related papers.</p>
                <ul id="citation-list"></ul>
            </div>
            
            <div class="controls">
                <button id="refresh-btn">Refresh Words</button>
                <button id="share-btn">Share Poem</button>
            </div>
        </aside>
    </main>

    <script src="script.js"></script>
</body>
</html>
