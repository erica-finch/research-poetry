<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Poetry in Research</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <div class="header-content">
            <h1>Poetry in Research</h1>
            <p>Drag words to create a poem. Click a word to see the research behind it.</p>
        </div>
        <nav class="top-nav">
            <a href="https://github.com/erica-finch/research-poetry/" target="_blank">About</a>
        </nav>
    </header>

    <main id="game-container">
        <div id="workspace"></div>

        <aside id="info-panel">
            <section class="citation-section">
                <h2>Research Citations</h2>
                <div id="citation-display">
                    <p class="placeholder">Click a word tile to explore related papers.</p>
                    <ul id="citation-list"></ul>
                </div>
            </section>

            <section class="resource-section">
                <h3>Explore More</h3>
                <nav class="resource-links">
                    <a href="https://libraryguides.nosm.ca/AnnFacPubs" target="_blank">NOSM U Faculty Publications</a>
                    <a href="#" id="view-bibliography">Full Bibliography</a>
                </nav>
            </section>
            
            <div class="controls">
                <button id="refresh-btn">Refresh Words</button>
                <button id="share-btn">Share Poem</button>
            </div>
        </aside>
    </main>

    <script src="script.js"></script>
</body>
</html>
