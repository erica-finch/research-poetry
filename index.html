<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <!-- EDIT: Change this text to appear in the browser tab -->
    <title>Research Poetry | NOSM University</title>
    
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <div class="header-branding">
        <h1>Research Poetry</h1>
        <p>Drag words to create a poem. Click a word to see the research behind it.</p>
    </div>

    <nav class="header-nav" aria-label="Secondary Navigation">
        <div class="nav-container">
            
            <!-- EDIT: Update these links to point to your institution's resources -->
            <a href="bibliography.html" target="_blank">game bibliography</a>
            <a href="https://libraryguides.nosm.ca/AnnFacPubs" target="_blank">explore more research from NOSM U</a>
            <a href="https://github.com/erica-finch/research-poetry" target="_blank">about</a>
            
        </div>
    </nav>
</header>

<main id="game-container">
    <div id="workspace" aria-label="Poetry Workspace"></div>

    <aside id="info-panel">
        <section class="citation-section">
            <h2>Citations</h2>
            <div id="citation-display">
                <p class="placeholder">Click a word tile to explore related papers.</p>
                <ul id="citation-list"></ul>
            </div>
        </section>
        
        <div class="controls">
            <button type="button" id="refresh-btn">Refresh Words</button>
            <button type="button" id="share-btn">Share Poem</button>
        </div>
    </aside>
</main>

<script src="script.js"></script>
</body>
</html>
